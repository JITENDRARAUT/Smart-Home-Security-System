<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Camera Node Transmitter</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { background: #0f172a; color: white; font-family: system-ui, sans-serif; text-align: center; padding: 20px; }
        .wrapper { max-width: 500px; margin: 0 auto; background: #1e293b; padding: 20px; border-radius: 16px; border: 1px solid #334155; }
        video { width: 100%; border-radius: 12px; border: 2px solid #38bdf8; background: #000; margin-top: 15px; }
        .status { margin: 15px 0; padding: 12px; border-radius: 8px; font-weight: bold; background: #0f172a; color: #38bdf8; font-size: 0.9rem; }
        .siren-badge { display: inline-block; padding: 8px 16px; background: #ef4444; border-radius: 20px; font-weight: bold; font-size: 0.8rem; margin-top: 10px; display: none; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>
    <div class="wrapper">
        <h2>🎥 Aegis Phone AI Camera Node</h2>
        <div class="status" id="camStatus">Loading TensorFlow Neural Intelligence Kernels...</div>
        <div class="siren-badge" id="sirenBadge">🚨 AUDIO SIREN ACTIVE</div>
        <video id="phoneVideo" autoplay playsinline muted></video>
        <canvas id="captureCanvas" style="display:none;"></canvas>
    </div>

    <script>
        const video = document.getElementById('phoneVideo');
        const canvas = document.getElementById('captureCanvas');
        const context = canvas.getContext('2d');
        const statusText = document.getElementById('camStatus');
        const sirenBadge = document.getElementById('sirenBadge');

        const cameraWsUrl = `ws://${window.location.host}/ws-camera`;
        const cameraSocket = new WebSocket(cameraWsUrl);

        let objectModel = null;
        let lastMotionSentState = "Safe";
        let windowLastLabel = "None";
        let sirenIntervalId = null;
        let audioCtx = null;

        cocoSsd.load().then(model => {
            objectModel = model;
            statusText.textContent = "🤖 Intelligence Layer Armed. Awaiting Pipeline Synchronization...";
        });

        cameraSocket.onopen = () => { initializeHardwareCamera(); };

        cameraSocket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.command === "play_siren") {
                startContinuousSirenLoop();
            }
        };

        function initializeHardwareCamera() {
            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 480, height: 360 }, 
                audio: false 
            })
            .then((stream) => {
                video.srcObject = stream;
                
                setInterval(async () => {
                    if (cameraSocket.readyState === WebSocket.OPEN && objectModel) {
                        canvas.width = 320;
                        canvas.height = 240;
                        context.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        const predictions = await objectModel.detect(video);
                        let currentMotionState = "Safe";
                        let detectedLabel = "None";

                        if (predictions.length > 0) {
                            const bestMatch = predictions.find(p => p.score > 0.55);
                            if (bestMatch) {
                                currentMotionState = "Detected";
                                detectedLabel = bestMatch.class;
                                statusText.textContent = `🎯 Target Identified: ${detectedLabel.toUpperCase()}`;
                            }
                        } else {
                            statusText.textContent = "🟢 Monitoring environment bounds cleanly...";
                        }

                        if (currentMotionState !== lastMotionSentState || detectedLabel !== windowLastLabel) {
                            cameraSocket.send(JSON.stringify({
                                motion: currentMotionState,
                                object_class: detectedLabel
                            }));
                            lastMotionSentState = currentMotionState;
                            windowLastLabel = detectedLabel;
                        }

                        const frameDataString = canvas.toDataURL('image/jpeg', 0.4);
                        cameraSocket.send(JSON.stringify({ image: frameDataString }));
                    }
                }, 220);
            })
            .catch(err => { statusText.textContent = "🔴 Access Denied: " + err; });
        }

        function startContinuousSirenLoop() {
            if (sirenIntervalId) return; 
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            sirenBadge.style.display = "inline-block";
            
            sirenIntervalId = setInterval(() => {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = "sawtooth";
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(1400, audioCtx.currentTime + 0.3);
                osc.frequency.linearRampToValueAtTime(880, audioCtx.currentTime + 0.6);

                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.6);
            }, 650);

            setTimeout(() => {
                clearInterval(sirenIntervalId);
                sirenIntervalId = null;
                sirenBadge.style.display = "none";
            }, 8000);
        }
    </script>
</body>
</html>
