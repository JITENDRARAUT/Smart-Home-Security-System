<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Camera Node Transmitter</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { max-width: 450px; margin: 30px auto; background: #1e293b; padding: 20px; border-radius: 16px; border: 1px solid #334155; }
        video { width: 100%; border-radius: 12px; border: 2px solid #38bdf8; background: #000; margin-top: 15px; }
        .status { margin: 15px 0; padding: 12px; border-radius: 8px; font-weight: bold; background: #0f172a; color: #38bdf8; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🎥 Mobile Camera Transmitter Node</h2>
        <div class="status" id="camStatus">Connecting to security network...</div>
        <video id="phoneVideo" autoplay playsinline muted></video>
        <canvas id="captureCanvas" style="display:none;"></canvas>
    </div>

    <script>
        const video = document.getElementById('phoneVideo');
        const canvas = document.getElementById('captureCanvas');
        const context = canvas.getContext('2d');
        const statusText = document.getElementById('camStatus');

        // Dynamically adapts to Port 80 automatically!
        const cameraWsUrl = `ws://${window.location.host}/ws-camera`;
        const cameraSocket = new WebSocket(cameraWsUrl);

        cameraSocket.onopen = () => {
            statusText.textContent = "🟢 Connected. Accessing phone camera hardware...";
            startStreaming();
        };

        cameraSocket.onclose = () => {
            statusText.textContent = "🔴 Connection dropped from cloud server.";
        };

        function startStreaming() {
            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 480, height: 360 }, 
                audio: false 
            })
            .then((stream) => {
                video.srcObject = stream;
                statusText.textContent = "🟢 Streaming Live Data Loop Active";
                
                setInterval(() => {
                    if (cameraSocket.readyState === WebSocket.OPEN) {
                        canvas.width = 400;
                        canvas.height = 300;
                        context.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        // Optimized compression prevents server crashes
                        const compressedFrame = canvas.toDataURL('image/jpeg', 0.4);
                        cameraSocket.send(compressedFrame);
                    }
                }, 120);
            })
            .catch(err => {
                statusText.textContent = "🔴 Camera error: " + err;
            });
        }
    </script>
</body>
</html>
